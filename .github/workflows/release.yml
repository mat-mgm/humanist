name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and upload packages to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CLI
        run: |
          cargo build -p os_cli --release
          cp target/release/os_cli os_cli-linux-x86_64

      - name: Install frontend dependencies
        run: npm ci
        working-directory: os_gui

      - name: Build GUI packages
        run: npx tauri build
        working-directory: os_gui

      - name: List build artifacts
        run: find target/release/bundle -type f | sort

      - name: Create release and upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            || true
          gh release upload ${{ env.RELEASE_TAG }} \
            os_cli-linux-x86_64 \
            target/release/bundle/deb/*.deb \
            target/release/bundle/rpm/*.rpm \
            target/release/bundle/appimage/*.AppImage \
            --clobber

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CLI
        run: |
          cargo build -p os_cli --release
          cp target/release/os_cli.exe os_cli-windows-x86_64.exe

      - name: Install frontend dependencies
        run: npm ci
        working-directory: os_gui

      - name: Build GUI packages
        run: npx tauri build
        working-directory: os_gui

      - name: List build artifacts
        shell: bash
        run: find target/release/bundle -type f | sort

      - name: Create release and upload Windows assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            || true
          gh release upload ${{ env.RELEASE_TAG }} \
            os_cli-windows-x86_64.exe \
            target/release/bundle/msi/*.msi \
            target/release/bundle/nsis/*.exe \
            --clobber
