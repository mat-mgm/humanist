name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            protobuf-compiler

      - name: Build CLI
        run: |
          cargo build -p os_cli --release
          cp target/release/os_cli os_cli-linux-x86_64

      - name: Install frontend dependencies
        run: npm ci
        working-directory: os_gui

      - name: Build GUI packages
        run: cargo tauri build
        working-directory: os_gui

      - name: Create release and upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || true
          gh release upload ${{ github.ref_name }} \
            os_cli-linux-x86_64 \
            os_gui/src-tauri/target/release/bundle/deb/*.deb \
            os_gui/src-tauri/target/release/bundle/rpm/*.rpm \
            os_gui/src-tauri/target/release/bundle/appimage/*.AppImage \
            --clobber

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CLI
        run: |
          cargo build -p os_cli --release
          cp target/release/os_cli.exe os_cli-windows-x86_64.exe

      - name: Install frontend dependencies
        run: npm ci
        working-directory: os_gui

      - name: Build GUI packages
        run: cargo tauri build
        working-directory: os_gui

      - name: Create release and upload Windows assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || true
          gh release upload ${{ github.ref_name }} \
            os_cli-windows-x86_64.exe \
            os_gui/src-tauri/target/release/bundle/msi/*.msi \
            os_gui/src-tauri/target/release/bundle/nsis/*.exe \
            --clobber
